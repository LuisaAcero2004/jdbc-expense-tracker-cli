services:
  mysql:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: expense-tracker-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: expenseTracker
      MYSQL_USER: expenseuser
      MYSQL_PASSWORD: expensepass
    volumes:
      - expense_tracker_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "expenseuser", "-pexpensepass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  expense_tracker_data:
